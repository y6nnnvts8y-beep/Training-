<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training Log">
<meta name="theme-color" content="#080808">
<title>Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --surface: #0d0d0d;
    --surface2: #121212;
    --border: #1e1e1e;
    --text: #e0ddd8;
    --dim: #666;
    --muted: #333;
    --upper: #4fc3f7; --upper-bg: #0d1f2d;
    --lower: #81c784; --lower-bg: #0d1f0d;
    --core: #ce93d8;  --core-bg: #1f0d1f;
    --full: #ffb74d;  --full-bg: #1f1a08;
    --cali: #ef9a9a;  --cali-bg: #1a0d0d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }

  /* LAYOUT */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  #header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; padding-top: max(16px, env(safe-area-inset-top)); }
  #week-strip { padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #session-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: max(20px, env(safe-area-inset-bottom)); }

  /* HEADER */
  .header-title { display: flex; align-items: baseline; gap: 10px; }
  .header-title h1 { font-family: 'Bebas Neue'; font-size: 36px; letter-spacing: 0.05em; line-height: 1; color: var(--text); }
  .wk-badge { font-size: 9px; color: var(--muted); letter-spacing: 3px; }
  .header-sub { font-size: 8px; color: var(--muted); letter-spacing: 1.5px; margin-top: 2px; }

  /* WEEK STRIP */
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 7px 3px; cursor: pointer; font-family: 'DM Mono'; font-size: 7px;
    letter-spacing: 0.5px; text-align: center; border-radius: 3px; transition: all 0.15s;
    position: relative; user-select: none;
  }
  .day-btn .day-name { font-family: 'Bebas Neue'; font-size: 16px; letter-spacing: 0.03em; display: block; line-height: 1.1; }
  .day-btn .day-label { font-size: 6px; line-height: 1.3; display: block; }
  .day-btn.active { border-color: rgba(224,221,216,0.5); color: var(--text); background: var(--surface2); }
  .day-btn.rest-day { opacity: 0.35; cursor: default; }
  .day-btn.today-dot::after { content: ''; position: absolute; top: 4px; right: 4px; width: 4px; height: 4px; border-radius: 50%; background: var(--lower); }

  /* SESSION */
  .session-inner { padding: 14px 16px 0; }
  .session-header { margin-bottom: 12px; }
  .session-title-row { display: flex; align-items: baseline; justify-content: space-between; }
  .session-title { font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 0.05em; }
  .session-time { font-size: 9px; color: var(--muted); }
  .tags-row { display: flex; gap: 5px; margin-top: 6px; }
  .zone-tag { font-size: 7px; letter-spacing: 1.5px; padding: 2px 6px; border-radius: 2px; font-weight: 500; }
  .overall-progress { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
  .prog-bar-wrap { flex: 1; height: 2px; background: var(--surface2); border-radius: 1px; overflow: hidden; }
  .prog-bar-fill { height: 100%; background: rgba(224,221,216,0.35); border-radius: 1px; transition: width 0.4s ease; }
  .prog-label { font-size: 9px; color: var(--muted); white-space: nowrap; }

  /* FILTER */
  .filter-row { display: flex; gap: 4px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; cursor: pointer; font-family: 'DM Mono'; font-size: 8px;
    letter-spacing: 1.5px; border-radius: 2px; transition: all 0.15s; white-space: nowrap;
  }
  .filter-btn.active { color: var(--text); border-color: rgba(255,255,255,0.2); background: var(--surface2); }

  /* WARMUP */
  .warmup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; margin-bottom: 8px; }
  .card-label { font-size: 8px; color: var(--muted); letter-spacing: 3px; margin-bottom: 8px; }
  .warmup-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
  .warmup-row:last-child { border-bottom: none; }
  .warmup-name { color: var(--dim); }
  .warmup-detail { color: var(--muted); font-size: 9px; text-align: right; max-width: 55%; }

  /* BLOCK CARD */
  .block-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 8px; transition: opacity 0.3s; border-left-width: 2px; }
  .block-card.all-done { opacity: 0.5; }
  .block-header { background: var(--surface); padding: 9px 13px; display: flex; align-items: center; justify-content: space-between; }
  .block-header-left { display: flex; align-items: center; gap: 8px; }
  .block-muscle { font-family: 'Bebas Neue'; font-size: 15px; letter-spacing: 1px; color: #aaa; }
  .block-zone-tag { font-size: 7px; letter-spacing: 1px; padding: 1px 5px; border-radius: 2px; }
  .block-header-right { display: flex; align-items: center; gap: 6px; }
  .editable { border-bottom: 1px dashed rgba(255,255,255,0.12); cursor: pointer; transition: color 0.15s; }
  .editable:active { color: #fff; }
  .sets-count { font-size: 10px; color: var(--muted); }
  .rest-badge { font-size: 8px; color: var(--muted); padding: 2px 6px; border: 1px solid var(--border); border-radius: 2px; letter-spacing: 0.5px; }
  .block-body { background: var(--bg); padding: 10px 13px; }
  .note-line { font-size: 8px; color: #484848; font-style: italic; line-height: 1.6; padding-bottom: 7px; margin-bottom: 8px; border-bottom: 1px solid #111; letter-spacing: 0.3px; }

  /* EXERCISE ROW */
  .ex-row { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #0e0e0e; }
  .ex-row:last-of-type { border-bottom: none; }
  .ex-name { font-size: 11px; color: #999; }
  .ex-reps { font-size: 10px; color: var(--muted); }
  .weight-badge {
    font-size: 9px; color: #333; border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 2px; cursor: pointer;
    transition: all 0.15s; min-width: 52px; text-align: center; letter-spacing: 0.5px;
  }
  .weight-badge.has-weight { color: var(--full); border-color: #3a2a08; background: #130f00; }

  /* SET DOTS */
  .sets-row { margin-top: 10px; display: flex; align-items: center; gap: 4px; }
  .sets-label { font-size: 7px; color: #252525; letter-spacing: 1.5px; margin-right: 2px; }
  .set-dot {
    width: 24px; height: 24px; border-radius: 3px; border: 1px solid #1e1e1e;
    display: flex; align-items: center; justify-content: center; font-size: 9px;
    color: transparent; cursor: pointer; transition: all 0.12s; flex-shrink: 0;
  }
  .set-dot.done { color: #666; }
  .sets-progress { flex: 1; height: 1px; background: #0f0f0f; margin-left: 4px; border-radius: 1px; overflow: hidden; }
  .sets-progress-fill { height: 100%; opacity: 0.45; transition: width 0.3s ease; }

  /* REST DAY */
  .rest-day-view { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #1e1e1e; letter-spacing: 3px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px 12px 0 0; padding: 24px 22px;
    width: 100%; max-width: 480px;
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 20px; }
  .modal-prompt { font-size: 9px; color: var(--muted); letter-spacing: 2.5px; margin-bottom: 14px; }
  .modal-input {
    width: 100%; background: var(--bg); border: 1px solid #2e2e2e; color: var(--text);
    padding: 12px 13px; border-radius: 4px; font-family: 'DM Mono'; font-size: 16px;
    outline: none; caret-color: var(--text);
  }
  .modal-input:focus { border-color: #444; }
  .modal-btns { display: flex; gap: 8px; margin-top: 14px; }
  .modal-save {
    flex: 1; background: var(--surface2); border: 1px solid #333; color: var(--text);
    padding: 13px; border-radius: 4px; font-family: 'DM Mono'; font-size: 11px;
    letter-spacing: 1.5px; cursor: pointer;
  }
  .modal-cancel {
    flex: 1; background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 13px; border-radius: 4px; font-family: 'DM Mono'; font-size: 11px;
    letter-spacing: 1.5px; cursor: pointer;
  }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="header-title">
      <h1>TRAINING LOG</h1>
      <span class="wk-badge">WK 01</span>
    </div>
    <div class="header-sub">MON UPPER · TUE CORE · THU LOWER · FRI FULL BODY</div>
  </div>
  <div id="week-strip">
    <div class="week-grid" id="week-grid"></div>
  </div>
  <div id="session-scroll">
    <div id="session-content"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-prompt" id="modal-prompt"></div>
    <input class="modal-input" id="modal-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="modal-btns">
      <button class="modal-save" id="modal-save">SAVE</button>
      <button class="modal-cancel" id="modal-cancel">CANCEL</button>
    </div>
  </div>
</div>

<script>

// ─── STATE ───────────────────────────────────────────────────────────────────

let sessions = JSON.parse(localStorage.getItem('tl_sessions_v2') || 'null') || JSON.parse(JSON.stringify(DEFAULT_SESSIONS));
let progress  = JSON.parse(localStorage.getItem('tl_progress_v2') || '{}');
let activeDay = localStorage.getItem('tl_activeday') || 'MON';
let activeFilter = 'ALL';

function save() {
  localStorage.setItem('tl_sessions_v2', JSON.stringify(sessions));
  localStorage.setItem('tl_progress_v2', JSON.stringify(progress));
  localStorage.setItem('tl_activeday', activeDay);
}

function setKey(day, bi, si) { return `${day}-${bi}-${si}`; }
function isDone(day, bi, si)  { return !!progress[setKey(day,bi,si)]; }
function toggleSet(day, bi, si) {
  const k = setKey(day,bi,si);
  progress[k] = !progress[k];
  save(); render();
}
function setsCompleted(day, bi) {
  const block = sessions[day]?.blocks[bi];
  if (!block) return 0;
  return Array.from({length: block.sets}, (_,i) => isDone(day,bi,i)).filter(Boolean).length;
}
function totalSetsDay(day) {
  return sessions[day]?.blocks.reduce((a,b) => a + b.sets, 0) || 0;
}
function completedSetsDay(day) {
  return sessions[day]?.blocks.reduce((acc,_,bi) => acc + setsCompleted(day,bi), 0) || 0;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────

let modalCb = null;
const modalEl   = document.getElementById('modal');
const modalInput= document.getElementById('modal-input');
const modalPrompt=document.getElementById('modal-prompt');

function openModal(prompt, value, cb) {
  modalCb = cb;
  modalPrompt.textContent = prompt.toUpperCase();
  modalInput.value = value;
  modalEl.classList.add('open');
  setTimeout(() => modalInput.focus(), 250);
}
function closeModal() { modalEl.classList.remove('open'); modalCb = null; }

document.getElementById('modal-save').onclick = () => { if (modalCb) modalCb(modalInput.value); closeModal(); };
document.getElementById('modal-cancel').onclick = closeModal;
modalInput.addEventListener('keydown', e => { if (e.key === 'Enter') { if (modalCb) modalCb(modalInput.value); closeModal(); } });
modalEl.addEventListener('click', e => { if (e.target === modalEl) closeModal(); });

// ─── RENDER ──────────────────────────────────────────────────────────────────

function renderWeek() {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = WEEK.map(w => `
    <button class="day-btn${w.rest?' rest-day':''}${!w.rest&&activeDay===w.key?' active':''}${w.day==='MON'?' today-dot':''}"
      onclick="${w.rest ? '' : `setDay('${w.key}')`}">
      <span class="day-name">${w.day}</span>
      <span class="day-label">${w.label}</span>
    </button>
  `).join('');
}

function renderSession() {
  const el = document.getElementById('session-content');
  const s = sessions[activeDay];

  if (!s) {
    el.innerHTML = `<div class="rest-day-view">REST / BOXING DAY</div>`;
    return;
  }

  const total = totalSetsDay(activeDay);
  const done  = completedSetsDay(activeDay);
  const pct   = total > 0 ? (done/total*100) : 0;

  const tagsHtml = s.tags.map(t => {
    const z = ZONE[t] || ZONE.FULL;
    return `<span class="zone-tag" style="background:${z.bg};color:${z.accent};border:1px solid ${z.accent}22">${t}</span>`;
  }).join('');

  const filters = ['ALL','UPPER','LOWER','CORE','FULL','CALI'];
  const filterHtml = filters.map(f => `
    <button class="filter-btn${activeFilter===f?' active':''}"
      style="${activeFilter===f&&f!=='ALL'?`color:${(ZONE[f]||{accent:'#fff'}).accent};border-color:${(ZONE[f]||{accent:'#fff'}).accent}44`:''}"
      onclick="setFilter('${f}')">${f}</button>
  `).join('');

  const warmupHtml = activeFilter === 'ALL' ? `
    <div class="warmup-card">
      <div class="card-label">WARM UP</div>
      ${s.warmup.map(w => `
        <div class="warmup-row">
          <span class="warmup-name">${w.name}</span>
          <span class="warmup-detail">${w.detail}</span>
        </div>
      `).join('')}
    </div>
  ` : '';

  const blocksHtml = s.blocks.map((block, bi) => {
    if (activeFilter !== 'ALL' && block.zone !== activeFilter) return '';
    const z = ZONE[block.zone] || ZONE.FULL;
    const comp = setsCompleted(activeDay, bi);
    const allDone = comp === block.sets;
    const bPct = block.sets > 0 ? (comp/block.sets*100) : 0;

    const exHtml = block.exercises.map((ex, ei) => `
      <div class="ex-row">
        <span class="ex-name">${ex.name}</span>
        <span class="ex-reps editable" onclick="editReps('${activeDay}',${bi},${ei})">${ex.reps}</span>
        <span class="weight-badge${ex.weight?' has-weight':''}" onclick="editWeight('${activeDay}',${bi},${ei})">${ex.weight||'+ kg'}</span>
      </div>
    `).join('');

    const dotsHtml = Array.from({length: block.sets}, (_,si) => {
      const d = isDone(activeDay, bi, si);
      return `<div class="set-dot${d?' done':''}"
        style="${d?`background:${z.bg};border-color:${z.accent}44;color:${z.accent}`:''}"
        onclick="toggleSet('${activeDay}',${bi},${si})">${d?'✓':''}</div>`;
    }).join('');

    return `
      <div class="block-card${allDone?' all-done':''}" style="border-left-color:${z.accent}33">
        <div class="block-header">
          <div class="block-header-left">
            <span class="block-muscle">${block.muscle}</span>
            <span class="block-zone-tag" style="background:${z.bg};color:${z.accent}">${z.label}</span>
          </div>
          <div class="block-header-right">
            <span class="sets-count editable" onclick="editSets('${activeDay}',${bi})">${comp}/${block.sets} sets</span>
            <span class="rest-badge editable" onclick="editRest('${activeDay}',${bi})">REST ${block.rest}</span>
          </div>
        </div>
        <div class="block-body">
          ${block.note ? `<div class="note-line">⚑ ${block.note}</div>` : ''}
          ${exHtml}
          <div class="sets-row">
            <span class="sets-label">SETS</span>
            ${dotsHtml}
            <div class="sets-progress">
              <div class="sets-progress-fill" style="width:${bPct}%;background:${z.accent}"></div>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="session-inner">
      <div class="session-header">
        <div class="session-title-row">
          <span class="session-title">${s.fullDay} — ${s.label}</span>
          <span class="session-time">⏱ ${s.time}</span>
        </div>
        <div class="tags-row">${tagsHtml}</div>
        <div class="overall-progress">
          <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
          <span class="prog-label">${done}/${total} sets</span>
        </div>
      </div>
      <div class="filter-row">${filterHtml}</div>
      ${warmupHtml}
      ${blocksHtml}
    </div>
  `;
}

function render() { renderWeek(); renderSession(); }

// ─── ACTIONS ─────────────────────────────────────────────────────────────────

function setDay(key) { activeDay = key; activeFilter = 'ALL'; save(); render(); }
function setFilter(f) { activeFilter = f; render(); }

function editReps(day, bi, ei) {
  const ex = sessions[day].blocks[bi].exercises[ei];
  openModal(`Reps — ${ex.name}`, ex.reps, val => {
    sessions[day].blocks[bi].exercises[ei].reps = val;
    save(); render();
  });
}
function editWeight(day, bi, ei) {
  const ex = sessions[day].blocks[bi].exercises[ei];
  openModal(`Weight — ${ex.name}`, ex.weight, val => {
    sessions[day].blocks[bi].exercises[ei].weight = val;
    save(); render();
  });
}
function editSets(day, bi) {
  openModal('Number of sets', String(sessions[day].blocks[bi].sets), val => {
    const n = parseInt(val);
    if (n > 0) { sessions[day].blocks[bi].sets = n; save(); render(); }
  });
}
function editRest(day, bi) {
  openModal('Rest time (e.g. 90 sec)', sessions[day].blocks[bi].rest, val => {
    sessions[day].blocks[bi].rest = val;
    save(); render();
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
